<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="../css/style1.css">
</head>
<body>
    <div class="login-container">
        <div class="login-kiri">
            <img src="https://i.pinimg.com/736x/cf/af/73/cfaf73993f02d6f863a10a23dfa2828b.jpg" alt="Foto pasar bagus">
            <div class="teks">
            <h1>Sinpasa Market</h1>
            <p>Curation is the bridge between <br> inventory and legacy. Welcome to the <br>central registry.</p>
            </div>
        </div>
        <div class="register-kanan">
            <form action="register.php" method="post">
                <h2>Register Admin Account</h2>
                <h6>CREDENTAL MANAGEMENT SYSTEM</h6>
                <div class="input-register">
                <label for="username">Full Name</label><br>
                <input type="text" id="username" name="username" placeholder="Username" required>
                </div>
                <div class="input-register">
                <label for="email">Email</label><br>
                <input type="email" id="email" name="email" placeholder="Email" required>
                </div>
                <div class="input-register">
                <label for="role">System Role Assignment </label><br>
                    <div class="role">
                         <input type="text" id="role" placeholder="Market Administator" readonly>
                         <span class="default">DEFAULT ASSIGNMENT</span>
                    </div>
                <p class="fiksasi">You’re being  registered with standard market oversight and administrative permission. </p>
                </div>
                <div class="input-register">
                <label for="password">Password</label><br>
                <input type="password" id="password" name="password" placeholder="Password" required minlength="8">
                </div>
                <div class="button">
                <button type="submit" class="regis-button">Register Admin Account</button><br>
                <a href="login.html">Return to Login</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
